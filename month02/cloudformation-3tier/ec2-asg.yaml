AWSTemplateFormatVersion: "2010-09-09"
Description: "Launch Template + Auto Scaling Group"

Parameters:
  ProjectName:
    Type: String
    Default: tier3

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:
  # 起動テンプレート（EC2の設定を定義）
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${ProjectName}-lt"
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: t2.micro
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${ProjectName}-ec2-sg-id"
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            dnf update -y
            dnf install -y httpd
            systemctl start httpd
            systemctl enable httpd
            echo "<h1>Hello from $(hostname)</h1>" > /var/www/html/index.html

  # Auto Scaling Group
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "${ProjectName}-asg"
      MinSize: 2
      MaxSize: 4
      DesiredCapacity: 2
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Select
          - 0
          - !Split
            - ","
            - !ImportValue
              Fn::Sub: "${ProjectName}-public-subnet-ids"
        - !Select
          - 1
          - !Split
            - ","
            - !ImportValue
              Fn::Sub: "${ProjectName}-public-subnet-ids"
      TargetGroupARNs:
        - !ImportValue
          Fn::Sub: "${ProjectName}-tg-arn"
      HealthCheckType: ELB
      HealthCheckGracePeriod: 60
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-ec2"
          PropagateAtLaunch: true
